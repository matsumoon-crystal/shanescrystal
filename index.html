<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手鍊管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --cream: #F9F5EF;
    --warm-white: #FDFBF7;
    --stone: #E8E0D5;
    --stone-dark: #C9BDB0;
    --ink: #2A2420;
    --ink-light: #5A4F48;
    --ink-muted: #9A8F88;
    --rose: #C4857A;
    --rose-light: #F0E0DC;
    --sage: #7A9E8A;
    --sage-light: #DFF0E6;
    --amber: #C4A35A;
    --amber-light: #F5EDD5;
    --sky: #7A9EC4;
    --sky-light: #DDE8F0;
    --lavender: #9A8AC4;
    --lavender-light: #E8E5F0;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(42,36,32,0.08);
    --shadow-lg: 0 8px 32px rgba(42,36,32,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.6; }

  /* ── Auth screen ── */
  #auth-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .auth-card {
    background: var(--warm-white);
    border: 1px solid var(--stone);
    border-radius: var(--radius);
    padding: 48px 40px;
    text-align: center;
    max-width: 400px; width: 100%;
    box-shadow: var(--shadow-lg);
  }
  .auth-logo {
    font-family: 'Noto Serif TC', serif;
    font-size: 26px; font-weight: 600;
    color: var(--ink); margin-bottom: 8px;
  }
  .auth-sub { font-size: 13px; color: var(--ink-muted); margin-bottom: 32px; }
  .auth-desc { font-size: 12px; color: var(--ink-muted); margin-top: 16px; line-height: 1.8; }
  .google-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 11px 24px;
    background: var(--warm-white);
    border: 1px solid var(--stone-dark);
    border-radius: 8px;
    font-size: 14px; font-weight: 500;
    cursor: pointer; color: var(--ink);
    font-family: inherit;
    transition: all 0.15s;
    width: 100%; justify-content: center;
  }
  .google-btn:hover { background: var(--cream); border-color: var(--stone-dark); }

  /* ── Sync status ── */
  #sync-bar {
    display: none;
    position: fixed; top: 0; left: 0; right: 0;
    background: var(--ink); color: var(--cream);
    font-size: 12px; text-align: center;
    padding: 6px; z-index: 500;
    letter-spacing: 0.04em;
  }
  #sync-bar.show { display: block; }
  #sync-bar.ok { background: var(--sage); color: #fff; }
  #sync-bar.err { background: var(--rose); color: #fff; }

  /* ── App shell ── */
  #app-screen { display: none; }
  #app-screen.show { display: block; }
  .app-shell { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px; background: var(--ink); color: var(--cream);
    display: flex; flex-direction: column; flex-shrink: 0;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    transition: transform 0.3s;
  }
  .sidebar-logo { padding: 28px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar-logo h1 { font-family: 'Noto Serif TC', serif; font-size: 17px; font-weight: 600; color: var(--cream); letter-spacing: 0.05em; line-height: 1.4; }
  .sidebar-logo p { font-size: 11px; color: rgba(249,245,239,0.45); margin-top: 4px; letter-spacing: 0.08em; }
  .sidebar-nav { padding: 16px 12px; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    cursor: pointer; color: rgba(249,245,239,0.6);
    font-size: 13px; font-weight: 400;
    transition: all 0.15s; margin-bottom: 2px;
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: var(--cream); }
  .nav-item.active { background: rgba(255,255,255,0.12); color: var(--cream); font-weight: 500; }
  .nav-icon { width: 18px; height: 18px; opacity: 0.8; flex-shrink: 0; }
  .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,0.1); }
  .user-info { font-size: 12px; color: rgba(249,245,239,0.5); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sign-out-btn { background: none; border: 1px solid rgba(255,255,255,0.2); border-radius: var(--radius-sm); color: rgba(249,245,239,0.6); font-size: 12px; padding: 6px 12px; cursor: pointer; font-family: inherit; width: 100%; transition: all 0.15s; }
  .sign-out-btn:hover { border-color: rgba(255,255,255,0.4); color: var(--cream); }

  .main-content { margin-left: 220px; flex: 1; padding: 32px; max-width: 1100px; }
  .page { display: none; }
  .page.active { display: block; }
  .page-header { margin-bottom: 24px; }
  .page-header h2 { font-family: 'Noto Serif TC', serif; font-size: 24px; font-weight: 600; color: var(--ink); }
  .page-header p { font-size: 13px; color: var(--ink-muted); margin-top: 4px; }

  .card { background: var(--warm-white); border: 1px solid var(--stone); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .card-title { font-size: 13px; font-weight: 500; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--stone); }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat-card { background: var(--warm-white); border: 1px solid var(--stone); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); }
  .stat-val { font-size: 22px; font-weight: 500; color: var(--ink); font-family: 'Noto Serif TC', serif; }
  .stat-lbl { font-size: 11px; color: var(--ink-muted); margin-top: 3px; letter-spacing: 0.06em; }

  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
  .search-input { padding: 8px 12px 8px 32px; border: 1px solid var(--stone); border-radius: 20px; background: var(--warm-white); font-size: 13px; color: var(--ink); outline: none; width: 200px; font-family: inherit; transition: border-color 0.15s; }
  .search-input:focus { border-color: var(--stone-dark); }
  .fpill { padding: 5px 14px; border-radius: 20px; font-size: 12px; border: 1px solid var(--stone); background: var(--warm-white); cursor: pointer; color: var(--ink-muted); transition: all 0.15s; font-family: inherit; }
  .fpill:hover { border-color: var(--stone-dark); color: var(--ink); }
  .fpill.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  .price-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .price-card { background: var(--warm-white); border: 1px solid var(--stone); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow); }
  .price-card:hover { border-color: var(--stone-dark); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .pc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .pc-name { font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1.4; }
  .pc-note { font-size: 11px; color: var(--ink-muted); margin-bottom: 10px; min-height: 14px; }
  .pc-cost { font-size: 11px; color: var(--ink-muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--stone); }
  .sz-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-bottom: 1px solid var(--stone); }
  .sz-row:last-child { border-bottom: none; }
  .sz-lbl { font-size: 12px; color: var(--ink-muted); }
  .sz-lbl small { font-size: 10px; color: var(--stone-dark); margin-left: 3px; }
  .sz-price { font-size: 13px; font-weight: 500; color: var(--ink); }
  .sz-price.na { color: var(--stone-dark); font-weight: 400; font-size: 11px; }

  .pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .pill-甜顏 { background: var(--lavender-light); color: #5A4AA0; }
  .pill-秘語 { background: var(--sage-light); color: #3A6E50; }
  .pill-守護 { background: var(--sky-light); color: #3A5E80; }
  .pill-雙色心情 { background: var(--rose-light); color: #8A4840; }
  .pill-可可碎片 { background: var(--amber-light); color: #7A5A20; }
  .pill-異域風情 { background: #FAECE7; color: #6A3020; }
  .pill-籠子 { background: #EAF3DE; color: #3A6020; }
  .pill-default { background: var(--stone); color: var(--ink-muted); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(42,36,32,0.45); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--warm-white); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: modalIn 0.2s ease; }
  @keyframes modalIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .modal-name { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 600; color: var(--ink); }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--ink-muted); font-size: 22px; line-height: 1; padding: 0; margin-left: 12px; flex-shrink: 0; transition: color 0.15s; }
  .modal-close:hover { color: var(--ink); }
  .modal-note { font-size: 12px; color: var(--ink-light); background: var(--cream); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 14px; border: 1px solid var(--stone); }
  .modal-cost { font-size: 12px; color: var(--ink-muted); margin-bottom: 8px; }
  .m-sz-row { display: flex; justify-content: space-between; align-items: baseline; padding: 10px 0; border-bottom: 1px solid var(--stone); }
  .m-sz-row:last-child { border-bottom: none; }
  .m-sz-label { font-size: 13px; font-weight: 500; color: var(--ink); }
  .m-sz-range { font-size: 11px; color: var(--ink-muted); margin-left: 6px; }
  .m-sz-price { font-size: 20px; font-weight: 500; color: var(--ink); font-family: 'Noto Serif TC', serif; }
  .m-sz-price.na { font-size: 14px; font-weight: 400; color: var(--stone-dark); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-full { grid-column: 1/-1; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-muted); margin-bottom: 5px; letter-spacing: 0.04em; }
  .form-input { width: 100%; padding: 9px 12px; border: 1px solid var(--stone); border-radius: var(--radius-sm); font-size: 13px; color: var(--ink); background: var(--warm-white); font-family: inherit; outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
  .form-input:focus { border-color: var(--stone-dark); }
  .form-input::placeholder { color: var(--stone-dark); }
  .size-price-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 12px; }

  .btn { padding: 9px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: inherit; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--ink); color: var(--cream); }
  .btn-primary:hover { background: var(--ink-light); }
  .btn-secondary { background: var(--warm-white); color: var(--ink-muted); border: 1px solid var(--stone); }
  .btn-secondary:hover { border-color: var(--stone-dark); color: var(--ink); }
  .btn-ghost { background: none; border: none; color: var(--ink-muted); padding: 6px 10px; font-size: 12px; }
  .btn-ghost:hover { color: var(--ink); }
  .btn-danger { background: #F0E0DC; color: #8A3020; border: 1px solid #E0C0B8; }
  .btn-danger:hover { background: #E8D0C8; }
  .btn-add { width: 100%; padding: 9px; background: none; border: 1px dashed var(--stone-dark); border-radius: var(--radius-sm); font-size: 13px; color: var(--ink-muted); cursor: pointer; font-family: inherit; transition: all 0.15s; margin-top: 6px; }
  .btn-add:hover { background: var(--cream); color: var(--ink); }

  .mat-hdr { display: grid; gap: 8px; align-items: center; margin-bottom: 6px; padding: 0 4px; }
  .mat-row { display: grid; gap: 8px; align-items: center; margin-bottom: 8px; }
  .mat-hdr5, .mat-row5 { grid-template-columns: 2.2fr 85px 65px 80px 28px; }
  .mat-hdr4, .mat-row4 { grid-template-columns: 2.2fr 75px 65px 80px 28px; }
  .col-hdr { font-size: 11px; color: var(--ink-muted); text-align: center; letter-spacing: 0.04em; }
  .mat-select, .mat-input { padding: 7px 8px; border: 1px solid var(--stone); border-radius: var(--radius-sm); font-size: 13px; color: var(--ink); background: var(--warm-white); font-family: inherit; outline: none; width: 100%; transition: border-color 0.15s; }
  .mat-select:focus, .mat-input:focus { border-color: var(--stone-dark); }
  .mat-input { text-align: center; }
  .del-row { background: none; border: none; color: var(--stone-dark); cursor: pointer; font-size: 18px; line-height: 1; transition: color 0.15s; }
  .del-row:hover { color: var(--rose); }

  .cost-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--stone); font-size: 13px; color: var(--ink-light); }
  .cost-row:last-child { border-bottom: none; }
  .cost-row.total { font-size: 15px; font-weight: 500; color: var(--ink); padding-top: 10px; }
  .cost-row.sub { padding-left: 12px; font-size: 12px; }
  .type-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; margin-right: 4px; }
  .badge-bead { background: var(--lavender-light); color: #5A4AA0; }
  .badge-acc { background: var(--sage-light); color: #3A6E50; }

  .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--warm-white); border: 1px solid var(--stone); border-radius: var(--radius-sm); margin-bottom: 6px; transition: border-color 0.15s; }
  .manage-item:hover { border-color: var(--stone-dark); }
  .manage-item-info { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
  .manage-item-name { font-size: 13px; font-weight: 500; color: var(--ink); }
  .manage-item-cost { font-size: 11px; color: var(--ink-muted); }
  .manage-item-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .save-strip { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--stone); }
  .save-strip-title { font-size: 12px; font-weight: 500; color: var(--ink-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--ink); color: var(--cream); padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 500; transition: transform 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .mobile-toggle { display: none; position: fixed; top: 16px; left: 16px; z-index: 300; background: var(--ink); color: var(--cream); border: none; border-radius: 8px; padding: 8px 10px; cursor: pointer; font-size: 18px; line-height: 1; }

  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main-content { margin-left: 0; padding: 20px 16px 16px; }
    .mobile-toggle { display: block; }
    .page-header { padding-top: 48px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .size-price-grid { grid-template-columns: 1fr 1fr; }
    .price-grid { grid-template-columns: 1fr 1fr; }
    .mat-hdr5,.mat-row5,.mat-hdr4,.mat-row4 { grid-template-columns: 1fr 60px 55px 70px 24px; }
  }
  @media (max-width: 480px) { .price-grid { grid-template-columns: 1fr; } .stats-row { grid-template-columns: 1fr; } }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--stone-dark); border-radius: 3px; }
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">手鍊管理系統</div>
    <div class="auth-sub">SHEANS 手作</div>
    <button class="google-btn" onclick="signIn()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      使用 Google 帳號登入
    </button>
    <div class="auth-desc">資料將儲存在你的 Google Drive 中<br>檔案名稱：bracelet-data.json</div>
  </div>
</div>

<!-- Sync bar -->
<div id="sync-bar"></div>

<!-- App Screen -->
<div id="app-screen">
  <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <h1>手鍊管理系統</h1>
        <p>SHEANS 手作</p>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="switchPage('board',this)">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/>
            <rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/>
          </svg>查價板
        </button>
        <button class="nav-item" onclick="switchPage('calc',this)">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="14" height="14" rx="2"/><path d="M7 10h6M10 7v6"/>
          </svg>成本計算
        </button>
        <button class="nav-item" onclick="switchPage('manage',this)">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 6h12M4 10h12M4 14h8"/>
          </svg>款式管理
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info" id="user-email"></div>
        <button class="sign-out-btn" onclick="signOut()">登出</button>
      </div>
    </aside>

    <main class="main-content">
      <!-- 查價板 -->
      <div class="page active" id="page-board">
        <div class="page-header">
          <h2>查價板</h2>
          <p>點擊款式卡片查看詳細價格</p>
        </div>
        <div class="filter-bar">
          <div class="search-wrap">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="6"/><path d="m15 15 3 3"/></svg>
            <input class="search-input" type="text" placeholder="搜尋款式..." oninput="renderBoard()" id="search">
          </div>
          <div id="series-filters" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        </div>
        <div id="price-grid" class="price-grid"></div>
        <div id="board-empty" style="display:none;text-align:center;padding:48px 20px;color:var(--ink-muted);font-size:13px">尚無款式</div>
      </div>

      <!-- 成本計算 -->
      <div class="page" id="page-calc">
        <div class="page-header"><h2>成本計算</h2><p>計算完成後可直接儲存到查價板</p></div>
        <div class="card">
          <div class="card-title">基本設定</div>
          <div class="form-grid">
            <div class="form-group"><label>手圍大小</label>
              <select class="form-input" id="c-wrist" onchange="calcAll()">
                <option value="XS">XS｜10~11.5 cm</option><option value="S">S｜12~13.5 cm</option>

function signIn() {
  // Use Google Identity Services token flow
  const client = google.accounts.oauth2.initTokenClient({
    client_id: getClientId(),
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { showToast('登入失敗：' + resp.error); return; }
      accessToken = resp.access_token;
      // Get user info
      try {
        const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { Authorization: 'Bearer ' + accessToken }
        });
        currentUser = await r.json();
        document.getElementById('user-email').textContent = currentUser.email || '';
      } catch(e) {}
      showApp();
      await loadFromDrive();
    }
  });
  client.requestAccessToken();
}

function getClientId() {
  // Read from meta tag if set, else show instructions
  const m = document.querySelector('meta[name="google-client-id"]');
  if (m) return m.content;
  // Fallback: prompt user
  // const id = prompt('請輸入你的 Google OAuth Client ID\n（可從 Google Cloud Console 取得）');
  return id || '';
}

function signOut() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken);

// ── Google Drive API ──
async function driveRequest(method, url, body) {
  const opts = { method, headers: { Authorization: 'Bearer ' + accessToken } };
  if (body && typeof body === 'string') {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = body;
  } else if (body instanceof FormData) {
    opts.body = body;
  }
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r;
}

async function findOrCreateFile() {
  // Search for existing file
  const q = encodeURIComponent(`name='${FILE_NAME}' and trashed=false`);
  const r = await driveRequest('GET', `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
  const data = await r.json();
  if (data.files && data.files.length > 0) {
    driveFileId = data.files[0].id;
    return false; // existing
  }
  return true; // needs create
}

async function loadFromDrive() {
  showSync('從 Google Drive 載入資料...', '');
  try {
    const isNew = await findOrCreateFile();
    if (isNew) {
      // First time — create file with preset data
      products = JSON.parse(JSON.stringify(PRESET_DATA));
      await createDriveFile();
      showSync('首次使用，已建立資料檔案', 'ok');
    } else {
      // Load existing
      const r = await driveRequest('GET', `https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`);
      const data = await r.json();
      products = data.products || JSON.parse(JSON.stringify(PRESET_DATA));
      showSync('已從 Google Drive 載入', 'ok');
    }
    renderBoard(); renderFilters(); renderManageList();
    setTimeout(() => hideSyncBar(), 2000);
  } catch(e) {
    showSync('載入失敗，使用本機資料', 'err');
    products = JSON.parse(JSON.stringify(PRESET_DATA));
    renderBoard(); renderFilters(); renderManageList();
    setTimeout(() => hideSyncBar(), 3000);
  }
}

async function createDriveFile() {
  const meta = JSON.stringify({ name: FILE_NAME, mimeType: 'application/json' });
  const content = JSON.stringify({ products, updatedAt: new Date().toISOString() });
  const form = new FormData();
  form.append('metadata', new Blob([meta], {type:'application/json'}));
  form.append('file', new Blob([content], {type:'application/json'}));
  const r = await driveRequest('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', form);
  const d = await r.json();
  driveFileId = d.id;
}

async function saveToDrive() {
  if (!accessToken || !driveFileId) return;
  showSync('同步中...', '');
  try {
    const content = JSON.stringify({ products, updatedAt: new Date().toISOString() });
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
      method: 'PATCH',
      headers: {
        Authorization: 'Bearer ' + accessToken,
        'Content-Type': 'application/json'
      },
      body: content
    });
    showSync('已同步到 Google Drive', 'ok');
    setTimeout(() => hideSyncBar(), 2000);
  } catch(e) {
    showSync('同步失敗，請稍後再試', 'err');
    setTimeout(() => hideSyncBar(), 3000);
  }
}

function scheduleSync() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToDrive(), 1500);
}

function showSync(msg, type) {
  const bar = document.getElementById('sync-bar');
  bar.textContent = msg;
  bar.className = 'show' + (type ? ' ' + type : '');
}
function hideSyncBar() {
  document.getElementById('sync-bar').className = '';
}

// ── Helpers ──
function nextId() { return products.length ? Math.max(...products.map(p=>p.id))+1 : 1; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function pillHtml(series) {
  if (!series) return '';
  const cls = ['甜顏','秘語','守護','雙色心情','可可碎片','異域風情','籠子'].includes(series) ? 'pill-'+series : 'pill-default';
  return `<span class="pill ${cls}">${series}</span>`;
}
function switchPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

// ── Board ──
function getSeriesList() { return ['全部',...Array.from(new Set(products.map(p=>p.series||'默認')))]; }
function renderFilters() {
  document.getElementById('series-filters').innerHTML = getSeriesList().map(s=>
    `<button class="fpill${s===activeFilter?' active':''}" onclick="setFilter('${s}')">${s}</button>`
  ).join('');
}
function setFilter(s) { activeFilter=s; renderFilters(); renderBoard(); }

function renderBoard() {
  const q = (document.getElementById('search').value||'').toLowerCase();
  let list = products;
  if (activeFilter!=='全部') list=list.filter(p=>(p.series||'默認')===activeFilter);
  if (q) list=list.filter(p=>p.name.toLowerCase().includes(q)||(p.series||'').toLowerCase().includes(q)||(p.note||'').toLowerCase().includes(q));
  const grid=document.getElementById('price-grid');
  const empty=document.getElementById('board-empty');
  if (!list.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=list.map(p=>{
    const rows=SIZES.map(s=>{const v=p.prices[s.key];return`<div class="sz-row"><span class="sz-lbl">${s.label}<small>${s.range}</small></span><span class="sz-price${v?'':' na'}">${v?'NT$'+v:'—'}</span></div>`;}).join('');
    return`<div class="price-card" onclick="openModal(${p.id})">
      <div class="pc-header"><div class="pc-name">${p.name}</div>${pillHtml(p.series)}</div>
      <div class="pc-note">${p.note||''}</div>${rows}
      ${p.cost?`<div class="pc-cost">成本 NT$${p.cost}</div>`:''}
    </div>`;
  }).join('');
}

function openModal(id) {
  const p=products.find(x=>x.id===id);if(!p)return;
  document.getElementById('modal-name').textContent=p.name;
  document.getElementById('modal-badge').innerHTML=pillHtml(p.series);
  document.getElementById('modal-cost').textContent=p.cost?`成本：NT$${p.cost}`:'';
  const ne=document.getElementById('modal-note');
  if(p.note){ne.style.display='block';ne.textContent='使用珠子：'+p.note;}else ne.style.display='none';
  document.getElementById('modal-prices').innerHTML=SIZES.map(s=>{const v=p.prices[s.key];return`<div class="m-sz-row"><div><span class="m-sz-label">${s.label}</span><span class="m-sz-range">${s.range}</span></div><span class="m-sz-price${v?'':' na'}">${v?'NT$ '+v:'—'}</span></div>`;}).join('');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

// ── Calc ──
function getBeadPrice(name,size){
  if(name==='自訂')return null;
  const p=BEAD_PRICES[name];if(!p)return null;
  const sz=parseFloat(size);
  const keys=[3,4,6,8];
  const c=keys.reduce((a,b)=>Math.abs(b-sz)<Math.abs(a-sz)?b:a,keys[0]);
  return p[c]||null;
}
function beadOpts(sel){return BEAD_NAMES.map(n=>`<option value="${n}"${n===sel?' selected':''}>${n}</option>`).join('');}
function sizeOpts(sel){return['3','4','5','6','6.5','8','8.5','9','10'].map(s=>`<option value="${s}"${s===sel?' selected':''}>${s}mm</option>`).join('');}
function accOpts(sel){return ACC_NAMES.map(n=>`<option value="${n}"${n===sel?' selected':''}>${n}</option>`).join('');}

function renderBeads(){
  const wrist=document.getElementById('c-wrist').value;
  const mainSz=parseFloat(document.getElementById('c-mainsize').value);
  document.getElementById('c-total-beads').textContent=Math.round(WRIST_MM[wrist]/mainSz)+'顆';
  document.getElementById('bead-list').innerHTML=beads.map((b,i)=>{
    const autoP=getBeadPrice(b.name,b.size);
    return`<div class="mat-row mat-row5">
      <select class="mat-select" onchange="updBead(${i},'name',this.value)">${beadOpts(b.name)}</select>
      <select class="mat-select" onchange="updBead(${i},'size',this.value)">${sizeOpts(b.size)}</select>
      <input class="mat-input" type="number" min="0" value="${b.count}" onchange="updBead(${i},'count',this.value)">
      <input class="mat-input" type="number" min="0" placeholder="${autoP||'輸入'}" value="${b.customPrice!==null?b.customPrice:(autoP||'')}" onchange="updBead(${i},'customPrice',this.value)">
      <button class="del-row" onclick="rmBead(${i})">×</button>
    </div>`;
  }).join('');
}
function renderAccs(){
  document.getElementById('acc-list').innerHTML=accs.map((a,i)=>
    `<div class="mat-row mat-row4">
      <select class="mat-select" onchange="updAcc(${i},'name',this.value)">${accOpts(a.name)}</select>
      <input class="mat-input" type="text" value="${a.size}" onchange="updAcc(${i},'size',this.value)">
      <input class="mat-input" type="number" min="0" value="${a.count}" onchange="updAcc(${i},'count',this.value)">
      <input class="mat-input" type="number" min="0" value="${a.price}" onchange="updAcc(${i},'price',this.value)">
      <button class="del-row" onclick="rmAcc(${i})">×</button>
    </div>`
  ).join('');
}
function updBead(i,f,v){if(f==='name'){beads[i].name=v;beads[i].customPrice=null;}else if(f==='size'){beads[i].size=v;beads[i].customPrice=null;}else if(f==='count')beads[i].count=parseInt(v)||0;else if(f==='customPrice')beads[i].customPrice=v===''?null:(parseFloat(v)||0);calcAll();}
function updAcc(i,f,v){if(f==='count')accs[i].count=parseInt(v)||0;else if(f==='price')accs[i].price=parseFloat(v)||0;else accs[i][f]=v;calcAll();}
function addBead(){beads.push({name:"白水晶",size:"6",count:8,customPrice:null});calcAll();}
function rmBead(i){beads.splice(i,1);calcAll();}
function addAcc(){accs.push({name:"金隔片",size:"3mm",count:4,price:1});calcAll();}
function rmAcc(i){accs.splice(i,1);calcAll();}

function calcAll(){
  renderBeads();renderAccs();
  let bc=0;beads.forEach(b=>{const p=b.customPrice!==null?b.customPrice:getBeadPrice(b.name,b.size);bc+=(parseInt(b.count)||0)*(p||0);});
  let ac=0;accs.forEach(a=>{ac+=(parseInt(a.count)||0)*(parseFloat(a.price)||0);});
  const pkg=parseFloat(document.getElementById('c-pkg').value)||0;
  const labor=parseFloat(document.getElementById('c-labor').value)||0;
  const misc=parseFloat(document.getElementById('c-misc').value)||0;
  const markup=parseFloat(document.getElementById('c-markup').value)||0;
  const mat=bc+ac,base=mat+pkg+labor+misc;
  const price=Math.round(base*(1+markup/100)/10)*10;
  document.getElementById('r-mat').textContent='NT$'+mat;
  document.getElementById('r-base').textContent='NT$'+base;
  document.getElementById('r-price').textContent='NT$'+price;
  let bd=`<div class="cost-row"><span>珠子材料</span><span>NT$${bc}</span></div><div class="cost-row"><span>配件材料</span><span>NT$${ac}</span></div><div class="cost-row"><span>包材</span><span>NT$${pkg}</span></div><div class="cost-row"><span>人力</span><span>NT$${labor}</span></div><div class="cost-row"><span>線材</span><span>NT$${misc}</span></div>`;
  beads.forEach(b=>{const p=b.customPrice!==null?b.customPrice:getBeadPrice(b.name,b.size);const s=(parseInt(b.count)||0)*(p||0);bd+=`<div class="cost-row sub"><span><span class="type-badge badge-bead">珠</span>${b.name} ${b.size}mm×${b.count}</span><span>NT$${s}</span></div>`;});
  accs.forEach(a=>{const s=(parseInt(a.count)||0)*(parseFloat(a.price)||0);bd+=`<div class="cost-row sub"><span><span class="type-badge badge-acc">配</span>${a.name} ${a.size}×${a.count}</span><span>NT$${s}</span></div>`;});
  bd+=`<div class="cost-row total"><span>建議售價（+${markup}%）</span><span>NT$${price}</span></div>`;
  document.getElementById('cost-breakdown').innerHTML=bd;
}

function saveFromCalc(){
  const name=document.getElementById('c-savename').value.trim();
  if(!name){showToast('請輸入款式名稱');return;}
  const pkg=parseFloat(document.getElementById('c-pkg').value)||0,labor=parseFloat(document.getElementById('c-labor').value)||0,misc=parseFloat(document.getElementById('c-misc').value)||0,markup=parseFloat(document.getElementById('c-markup').value)||0;
  const wrist=document.getElementById('c-wrist').value;
  let bc=0;beads.forEach(b=>{const p=b.customPrice!==null?b.customPrice:getBeadPrice(b.name,b.size);bc+=(parseInt(b.count)||0)*(p||0);});
  let ac=0;accs.forEach(a=>{ac+=(parseInt(a.count)||0)*(parseFloat(a.price)||0);});
  const base=bc+ac+pkg+labor+misc,price=Math.round(base*(1+markup/100)/10)*10;
  const existing=products.find(p=>p.name===name);
  if(existing){existing.prices[wrist]=price;}
  else{const prices={XS:null,S:null,M:null,L:null,XL:null};prices[wrist]=price;const note=beads.map(b=>`${b.name}${b.size}mm×${b.count}`).join('、');products.push({id:nextId(),name,series:document.getElementById('c-saveseries').value.trim(),cost:base,note:document.getElementById('c-savenote').value.trim()||note,prices});}
  renderBoard();renderFilters();renderManageList();
  scheduleSync();
  showToast(`已儲存「${name}」${wrist} = NT$${price}`);
}

// ── Manage ──
function buildMSizeInputs(){
  document.getElementById('m-size-inputs').innerHTML=SIZES.map(s=>
    `<div class="form-group"><label>${s.label} <span style="font-weight:400;color:var(--stone-dark)">${s.range}</span></label><input type="number" class="form-input" id="m-${s.key}" min="0" placeholder="—"></div>`
  ).join('');
}
function renderManageList(){
  const el=document.getElementById('manage-list');
  if(!products.length){el.innerHTML='';return;}
  el.innerHTML=`<div style="font-size:12px;color:var(--ink-muted);margin-bottom:10px;letter-spacing:0.04em">共 ${products.length} 款</div>`+
    products.map(p=>`<div class="manage-item">
      <div class="manage-item-info"><span class="manage-item-name">${p.name}</span>${pillHtml(p.series)}${p.cost?`<span class="manage-item-cost">成本 NT$${p.cost}</span>`:''}</div>
      <div class="manage-item-actions">
        <button class="btn btn-secondary" style="padding:5px 12px;font-size:12px" onclick="editManage(${p.id})">編輯</button>
        <button class="btn btn-danger" style="padding:5px 10px;font-size:12px" onclick="delProduct(${p.id})">刪除</button>
      </div>
    </div>`).join('');
}
function saveManage(){
  const name=document.getElementById('m-name').value.trim();
  if(!name){showToast('請輸入款式名稱');return;}
  const prices={};SIZES.forEach(s=>{const v=parseFloat(document.getElementById('m-'+s.key).value);prices[s.key]=isNaN(v)?null:Math.round(v);});
  const cost=parseFloat(document.getElementById('m-cost').value)||null;
  const obj={name,series:document.getElementById('m-series').value.trim(),note:document.getElementById('m-note').value.trim(),cost,prices};
  if(editingId!==null){const idx=products.findIndex(p=>p.id===editingId);if(idx>-1)products[idx]={...products[idx],...obj};}
  else products.push({id:nextId(),...obj});
  scheduleSync();resetManage();renderBoard();renderFilters();renderManageList();showToast('已儲存');
}
function editManage(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  editingId=id;document.getElementById('m-name').value=p.name;document.getElementById('m-series').value=p.series||'';document.getElementById('m-note').value=p.note||'';document.getElementById('m-cost').value=p.cost||'';
  SIZES.forEach(s=>{document.getElementById('m-'+s.key).value=p.prices[s.key]||'';});
  document.getElementById('m-title').textContent='編輯：'+p.name;document.getElementById('m-save-btn').textContent='更新款式';document.getElementById('m-cancel-btn').style.display='inline-flex';window.scrollTo(0,0);
}
function resetManage(){
  editingId=null;['m-name','m-series','m-note','m-cost'].forEach(id=>document.getElementById(id).value='');
  SIZES.forEach(s=>{document.getElementById('m-'+s.key).value='';});
  document.getElementById('m-title').textContent='新增款式';document.getElementById('m-save-btn').textContent='儲存款式';document.getElementById('m-cancel-btn').style.display='none';
}
function delProduct(id){
  if(!confirm('確定要刪除這個款式？'))return;
  products=products.filter(p=>p.id!==id);
  scheduleSync();renderBoard();renderFilters();renderManageList();showToast('已刪除');
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
